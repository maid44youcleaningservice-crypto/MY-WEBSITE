<style>
:root{
  --cr:#9E1244;--cr-d:#7A0D34;--pink:#E0527F;--pink-l:#F2AABF;--pink-pale:#FDF0F5;
  --rose:#FFF8FB;--white:#fff;--text:#160810;--muted:#7A4558;--muted2:#B5879A;--border:#EDD5DF;
  --ff:"Libre Baskerville",Georgia,serif;--fb:"DM Sans",system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  min-height:100vh;
  font-family:var(--fb);
  color:var(--text);
  background:
    radial-gradient(circle at 15% 15%,rgba(224,82,127,.14),transparent 30%),
    radial-gradient(circle at 90% 70%,rgba(158,18,68,.10),transparent 34%),
    linear-gradient(135deg,#fff8fb 0%,#fff 52%,#fff1f7 100%);
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
.nav{
  position:fixed;top:0;left:0;right:0;z-index:10;
  height:76px;padding:0 clamp(22px,4.4vw,72px);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.96);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  box-shadow:0 8px 24px rgba(158,18,68,.06);
}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-logo img{width:46px;height:46px;border-radius:50%;object-fit:cover;box-shadow:0 2px 12px rgba(158,18,68,.16)}
.nav-logo-name{font-family:var(--ff);font-size:1.12rem;font-weight:700;color:var(--cr)}
.nav-back{font-size:.62rem;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--muted)}
.main{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:112px 22px 56px;
}
.card{
  width:min(760px,100%);
  text-align:center;
  background:rgba(255,255,255,.84);
  border:1px solid rgba(158,18,68,.12);
  border-radius:36px;
  padding:clamp(38px,6vw,70px);
  box-shadow:0 28px 80px rgba(49,20,34,.10);
  position:relative;
  overflow:hidden;
}
.card::before{
  content:"";position:absolute;inset:auto -18% -58% auto;width:52%;height:100%;border-radius:50%;
  background:rgba(158,18,68,.06);pointer-events:none;
}
.check{
  width:76px;height:76px;margin:0 auto 26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--pink-pale);border:1px solid var(--border);color:var(--cr);
}
.eye{
  font-size:.58rem;letter-spacing:3.5px;text-transform:uppercase;color:var(--pink);font-weight:700;margin-bottom:14px;
}
h1{
  font-family:var(--ff);font-size:clamp(2.4rem,5vw,4rem);font-weight:400;line-height:1.05;letter-spacing:-1px;margin-bottom:16px;
}
h1 em{font-style:italic;color:var(--cr)}
p{
  color:var(--muted);font-weight:300;line-height:1.9;font-size:1rem;max-width:540px;margin:0 auto 28px;
}
.actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:28px}
.btn-p,.btn-o{
  min-height:54px;padding:16px 30px;border-radius:999px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:.68rem;letter-spacing:2px;text-transform:uppercase;font-weight:800;
}
.btn-p{background:var(--cr);color:#fff;box-shadow:0 12px 32px rgba(158,18,68,.28)}
.btn-o{background:#fff;color:var(--cr);border:1px solid rgba(158,18,68,.24)}
@media(max-width:620px){
  .nav{height:68px;padding:0 18px}
  .nav-logo img{width:42px;height:42px}
  .nav-back{font-size:.54rem;letter-spacing:1.4px}
  .actions{flex-direction:column}
  .btn-p,.btn-o{width:100%}
}

/* === FINAL PERFORMANCE CURATION — mantém efeitos, deixa mais fluido === */
html,body{
  overflow-x:hidden;
}
img{
  content-visibility:auto;
}
.rv{
  will-change:opacity,transform;
  transform:translate3d(0,12px,0);
}
.rv.in{
  will-change:auto;
}
.hero-kitchen-photo,
.hero-kitchen-frame,
.hero-phone-card,
.free-estimate-card,
.areas-panel,
.tcard,
.scard,
.why-logo-panel,
.btn-p,
.btn-o,
.btn-w,
.btn-wl,
.nav-cta{
  transform:translateZ(0);
  backface-visibility:hidden;
}
@media (hover:none){
  .hero-kitchen-frame:hover .hero-kitchen-photo,
  .hero-phone-card:hover,
  .hero-kitchen-frame:hover,
  .free-estimate-card:hover,
  .areas-panel:hover,
  .tcard:hover,
  .scard:hover{
    transform:none!important;
  }
}
@media (max-width:720px){
  *{
    -webkit-tap-highlight-color:rgba(158,18,68,.08);
  }
  .hero-kitchen-photo{
    transform:none!important;
  }
  .hero-kitchen-frame,
  .free-estimate-card,
  .areas-panel,
  .tcard,
  .scard,
  .why-logo-panel{
    box-shadow:0 14px 34px rgba(49,20,34,.08);
  }
}


/* === CTA FLOATING FOOTER DISABLED — curadoria UX ===
   Motivo: no mobile estava redundante com os CTAs do footer e atrapalhando a leitura.
   CTAs normais do site continuam ativos. */
.sticky-cta,
.mobile-sticky,
.float-cta,
.floating-cta,
.bottom-cta,
.mobile-bottom-cta,
.cta-floating,
.sticky-actions,
.footer-floating,
.fixed-cta,
[class*="sticky-cta"],
[class*="floating-cta"],
[class*="mobile-sticky"],
[class*="bottom-cta"]{
  display:none!important;
  visibility:hidden!important;
  pointer-events:none!important;
}
body{padding-bottom:0!important;}


/* === FINAL QA UX LAYER === */
html{scroll-behavior:smooth}
body{min-height:100%;overflow-x:hidden}
a,button{touch-action:manipulation}
img{max-width:100%;height:auto}
.nav-back,.btn-home{cursor:pointer}
@media(max-width:768px){
  .nav-back{min-height:38px;display:inline-flex;align-items:center}
  .ba-media{aspect-ratio:4/3}
}


/* === FAILSAFE ASSET + UX QA LAYER === */
html{scroll-behavior:smooth}
body{overflow-x:hidden}
img{max-width:100%;height:auto}
a,button{touch-action:manipulation}
@media(max-width:768px){.nav-back{min-height:38px;display:inline-flex;align-items:center}.ba-media{aspect-ratio:4/3}}


/* === QA TOTAL: arquivo por arquivo === */
html{scroll-behavior:smooth}
body{overflow-x:hidden}
img{max-width:100%;height:auto}
a,button{touch-action:manipulation}
.nav-logo-img{object-fit:cover}
.t-av{overflow:hidden}
.t-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}
@media(max-width:768px){
  .nav-back{min-height:38px;display:inline-flex;align-items:center}
  .ba-media{aspect-ratio:4/3}
}


/* === QA FINAL: correção global de imagens, política, rodapé e responsividade === */
.nav-logo,
.foot-brand{
  display:flex!important;
  align-items:center!important;
  gap:10px!important;
}
.nav-logo img,
.nav-logo-img{
  width:40px!important;
  height:40px!important;
  max-width:40px!important;
  max-height:40px!important;
  min-width:40px!important;
  min-height:40px!important;
  border-radius:50%!important;
  object-fit:cover!important;
  flex:0 0 40px!important;
  display:block!important;
}
.foot-brand img,
.foot-brand-logo{
  width:36px!important;
  height:36px!important;
  max-width:36px!important;
  max-height:36px!important;
  min-width:36px!important;
  min-height:36px!important;
  border-radius:50%!important;
  object-fit:cover!important;
  flex:0 0 36px!important;
  display:block!important;
}
.qleft-logo{
  width:112px!important;
  height:112px!important;
  max-width:112px!important;
  max-height:112px!important;
  border-radius:50%!important;
  object-fit:cover!important;
}
.wrap,
.policy-wrap,
.legal-wrap{
  position:relative!important;
  z-index:1!important;
}
img{
  max-width:100%;
  height:auto;
}
.page-enter{
  animation:qaPageIn .42s cubic-bezier(.22,.61,.36,1) both;
}
@keyframes qaPageIn{
  from{opacity:0;transform:translate3d(0,10px,0)}
  to{opacity:1;transform:translate3d(0,0,0)}
}
.form-step{
  transition:opacity .28s cubic-bezier(.22,.61,.36,1),transform .28s cubic-bezier(.22,.61,.36,1);
}
.form-step.active{
  animation:qaStepIn .34s cubic-bezier(.22,.61,.36,1) both;
}
@keyframes qaStepIn{
  from{opacity:0;transform:translate3d(0,12px,0)}
  to{opacity:1;transform:translate3d(0,0,0)}
}
@media(max-width:900px){
  .nav{height:64px!important;padding-left:20px!important;padding-right:20px!important}
  .wrap{padding-top:104px!important}
  .foot-inner{gap:28px!important}
}
@media(max-width:600px){
  .nav-logo-name{font-size:.95rem!important}
  .nav-back{font-size:.56rem!important;letter-spacing:1.6px!important}
  .foot-bottom{flex-direction:column!important;gap:14px!important;align-items:flex-start!important}
  .foot-policies{flex-wrap:wrap!important}
}
